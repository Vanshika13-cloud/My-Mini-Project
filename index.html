<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DO IT — Task Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <div class="noise"></div>

  <main class="container">

    <header class="header">
      <div class="header-top">
        <h1 class="logo">DO<span class="dot">.</span>IT</h1>
        <div class="stats">
          <span class="stat" id="done-count">0 done</span>
          <span class="divider">/</span>
          <span class="stat" id="total-count">0 total</span>
        </div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </header>

    <section class="input-section">
      <div class="input-wrap">
        <input
          type="text"
          id="task-input"
          class="task-input"
          placeholder="What needs doing?"
          maxlength="120"
          autocomplete="off"
        />
        <button class="add-btn" id="add-btn" aria-label="Add task">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="done">Done</button>
      </div>
    </section>

    <section class="tasks-section">
      <ul class="task-list" id="task-list">
        <!-- tasks injected here -->
      </ul>
      <div class="empty-state" id="empty-state">
        <span class="empty-icon">◎</span>
        <p>No tasks here.<br>Add something above.</p>
      </div>
    </section>

    <footer class="footer" id="footer" style="display:none;">
      <button class="clear-btn" id="clear-done">Clear completed</button>
    </footer>

  </main>

  <script src="app.js"></script>
</body>
</html>
